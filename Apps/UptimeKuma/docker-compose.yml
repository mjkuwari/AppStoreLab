name: uptimekuma

services:
  uptimekuma:
    image: louislam/uptime-kuma:2.4.0
    container_name: uptimekuma
    restart: unless-stopped
    user: "0:0"
    networks:
      - pcs
    expose:
      - "80"
    labels:
      caddy_0: uptimekuma-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: uptimekuma-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: uptimekuma-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"
    volumes:
      - /DATA/AppData/$AppID/data/:/app/data
    environment:
      TZ: $TZ
      PUID: $PUID
      PGID: $PGID
      UPTIME_KUMA_PORT: 80
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http = require('http'); const req = http.request({host:'localhost',port:80,path:'/api/entry-page',timeout:3000}, res => { process.exit(res.statusCode === 200 ? 0 : 1) }); req.on('error', () => process.exit(1)); req.end()\""]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    cpu_shares: 90

networks:
  pcs:
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  main: uptimekuma
  webui_port: 80
  author: Yundera Team
  category: Utilities
  developer: Louis Lam
  store_app_id: uptimekuma
  tags: ["monitoring", "uptime", "status"]
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStoreLab@main/Apps/UptimeKuma/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStoreLab@main/Apps/UptimeKuma/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStoreLab@main/Apps/UptimeKuma/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStoreLab@main/Apps/UptimeKuma/screenshot-3.png
