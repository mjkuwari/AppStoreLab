  tips:
    before_install:
      en_us: |
        **Getting Started:**

        1. After installation, visit your Uptime Kuma instance
        2. Create your admin account on first visit
        3. Add your first monitor (HTTP, Ping, TCP, etc.)
        4. Set up notification channels (Email, Telegram, Discord, etc.)

        🔒 **HTTPS & Let's Encrypt**: Your connection is automatically secured with a Let's Encrypt certificate. After first setup, you may need to wait a few minutes for the certificate to be provisioned. Once issued, HTTPS works automatically.

        **Features:**
        - 20+ monitor types supported
        - 90+ notification services
        - Public status pages
        - Certificate expiry monitoring

        **Note:** The first user to register becomes the admin.
      ko_kr: |
        **시작하기:**

        1. 설치 후 Uptime Kuma 인스턴스를 방문하세요
        2. 첫 방문 시 관리자 계정을 생성하세요
        3. 첫 번째 모니터를 추가하세요 (HTTP, Ping, TCP 등)
        4. 알림 채널을 설정하세요 (이메일, Telegram, Discord 등)

        🔒 **HTTPS & Let's Encrypt**: Let's Encrypt 인증서로 자동 보안됩니다. 첫 설정 후 인증서가 발급될 때까지 몇 분 정도 기다려야 할 수 있습니다. 발급 완료 후 HTTPS가 자동으로 작동합니다.

        **기능:**
        - 20가지 이상의 모니터 유형 지원
        - 90개 이상의 알림 서비스
        - 공개 상태 페이지
        - 인증서 만료 모니터링

        **참고:** 첫 번째 등록 사용자가 관리자가 됩니다.
      zh_cn: |
        **开始使用：**

        1. 安装后，访问您的 Uptime Kuma 实例
        2. 首次访问时创建管理员账户
        3. 添加您的第一个监控（HTTP、Ping、TCP 等）
        4. 设置通知渠道（邮件、Telegram、Discord 等）

        🔒 **HTTPS & Let's Encrypt**：通过 Let's Encrypt 证书自动加密。首次设置后，您可能需要等待几分钟以完成证书签发。签发完成后，HTTPS 将自动生效。

        **功能：**
        - 支持 20 多种监控类型
        - 90 多种通知服务
        - 公开状态页面
        - 证书到期监控

        **注意：** 第一个注册的用户成为管理员。
      fr_fr: |
        **Commencer :**

        1. Après l'installation, visitez votre instance Uptime Kuma
        2. Créez votre compte administrateur lors de la première visite
        3. Ajoutez votre premier moniteur (HTTP, Ping, TCP, etc.)
        4. Configurez les canaux de notification (e-mail, Telegram, Discord, etc.)

        🔒 **HTTPS & Let's Encrypt** : Votre connexion est automatiquement sécurisée avec un certificat Let's Encrypt. Après la première installation, vous devrez peut-être attendre quelques minutes pour que le certificat soit provisionné. Une fois émis, HTTPS fonctionne automatiquement.

        **Fonctionnalités :**
        - Plus de 20 types de moniteurs supportés
        - Plus de 90 services de notification
        - Pages de statut publiques
        - Surveillance de l'expiration des certificats

        **Note :** Le premier utilisateur à s'inscrire devient l'administrateur.
      es_es: |
        **Comenzar:**

        1. Después de la instalación, visite su instancia de Uptime Kuma
        2. Cree su cuenta de administrador en la primera visita
        3. Agregue su primer monitor (HTTP, Ping, TCP, etc.)
        4. Configure los canales de notificación (correo, Telegram, Discord, etc.)

        🔒 **HTTPS & Let's Encrypt**: Su conexión se asegura automáticamente con un certificado Let's Encrypt. Después de la primera configuración, es posible que deba esperar unos minutos para que se emita el certificado. Una vez emitido, HTTPS funciona automáticamente.

        **Características:**
        - Más de 20 tipos de monitores soportados
        - Más de 90 servicios de notificación
        - Páginas de estado públicas
        - Monitoreo de expiración de certificados

        **Nota:** El primer usuario en registrarse se convierte en administrador.
