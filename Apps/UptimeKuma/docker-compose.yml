  description:
    en_us: |
      **Self-hosted monitoring tool for websites, APIs, and services**

      Uptime Kuma is a fancy, open-source monitoring tool that checks if your websites, APIs, and services are online. Get instant notifications when something goes down.

      **Key Features:**
      - HTTP(s), TCP, Ping, DNS, Docker, and 20+ monitor types
      - Beautiful real-time status dashboard
      - Notifications via Email, Telegram, Discord, Slack, and 90+ services
      - Multi-language support
      - Status pages for public sharing
      - Proxy support (SOCKS5, HTTP)
      - Certificate expiry monitoring
      - 1-minute monitoring intervals

      **Perfect for:** Anyone who wants to monitor their websites, APIs, and services with a beautiful dashboard and instant alerts.
    ko_kr: |
      **웹사이트, API, 서비스를 위한 셀프호스팅 모니터링 도구**

      Uptime Kuma는 웹사이트, API, 서비스가 온라인인지 확인하는 세련된 오픈소스 모니터링 도구입니다. 서비스가 다운되면 즉시 알림을 받으세요.

      **주요 기능:**
      - HTTP(s), TCP, Ping, DNS, Docker 등 20가지 이상의 모니터 유형
      - 아름다운 실시간 상태 대시보드
      - 이메일, Telegram, Discord, Slack 등 90개 이상의 알림 서비스
      - 다국어 지원
      - 공개 공유를 위한 상태 페이지
      - 프록시 지원 (SOCKS5, HTTP)
      - 인증서 만료 모니터링
      - 1분 간격 모니터링

      **이런 분께 완벽해요:** 아름다운 대시보드와 즉각적인 알림으로 웹사이트, API, 서비스를 모니터링하고 싶은 모든 분.
    zh_cn: |
      **用于网站、API 和服务的自托管监控工具**

      Uptime Kuma 是一个精美的开源监控工具，可以检查您的网站、API 和服务是否在线。当服务宕机时，您会立即收到通知。

      **主要功能：**
      - HTTP(s)、TCP、Ping、DNS、Docker 等 20 多种监控类型
      - 精美的实时状态仪表板
      - 通过邮件、Telegram、Discord、Slack 等 90 多种服务发送通知
      - 多语言支持
      - 可公开分享的状态页面
      - 代理支持（SOCKS5、HTTP）
      - 证书到期监控
      - 1 分钟监控间隔

      **非常适合：** 任何想要通过精美仪表板和即时警报来监控网站、API 和服务的人。
    fr_fr: |
      **Outil de surveillance auto-hébergé pour sites web, API et services**

      Uptime Kuma est un élégant outil de surveillance open-source qui vérifie si vos sites web, API et services sont en ligne. Recevez des notifications instantanées en cas de panne.

      **Fonctionnalités principales :**
      - HTTP(s), TCP, Ping, DNS, Docker et plus de 20 types de moniteurs
      - Magnifique tableau de bord d'état en temps réel
      - Notifications par e-mail, Telegram, Discord, Slack et plus de 90 services
      - Support multilingue
      - Pages de statut pour le partage public
      - Support proxy (SOCKS5, HTTP)
      - Surveillance de l'expiration des certificats
      - Intervalles de surveillance d'1 minute

      **Parfait pour :** Toute personne souhaitant surveiller ses sites web, API et services avec un beau tableau de bord et des alertes instantanées.
    es_es: |
      **Herramienta de monitoreo auto-alojada para sitios web, APIs y servicios**

      Uptime Kuma es una elegante herramienta de monitoreo de código abierto que verifica si tus sitios web, APIs y servicios están en línea. Recibe notificaciones instantáneas cuando algo falla.

      **Características principales:**
      - HTTP(s), TCP, Ping, DNS, Docker y más de 20 tipos de monitores
      - Hermoso panel de estado en tiempo real
      - Notificaciones por correo, Telegram, Discord, Slack y más de 90 servicios
      - Soporte multiidioma
      - Páginas de estado para compartir públicamente
      - Soporte de proxy (SOCKS5, HTTP)
      - Monitoreo de expiración de certificados
      - Intervalos de monitoreo de 1 minuto

      **Perfecto para:** Cualquiera que quiera monitorear sus sitios web, APIs y servicios con un hermoso panel y alertas instantáneas.
  tagline:
    en_us: Self-hosted uptime monitoring with beautiful dashboard
    ko_kr: 아름다운 대시보드를 갖춘 셀프호스팅 업타임 모니터링
