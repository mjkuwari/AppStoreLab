name: crafty
services:
  crafty:
    image: registry.gitlab.com/crafty-controller/crafty-4:4.10.7
    container_name: crafty
    hostname: crafty
    user: "0:0"                          # Crafty requires root; see rationale.md
    cpu_shares: 50
    restart: unless-stopped
    expose:
      - 8443                             # self-signed HTTPS panel, reached by Caddy over the pcs network only
    ports:
      - "25500-25600:25500-25600"       # Minecraft Java server port pool (Crafty's default range for new servers)
      - "19132:19132/udp"               # Minecraft Bedrock
      - "8123:8123"                      # Dynmap
    environment:
      TZ: $TZ
    volumes:
      - /DATA/AppData/$AppID/backups:/crafty/backups
      - /DATA/AppData/$AppID/logs:/crafty/logs
      - /DATA/AppData/$AppID/servers:/crafty/servers
      - /DATA/AppData/$AppID/config:/crafty/app/config
      - /DATA/AppData/$AppID/import:/crafty/import
    labels:
      # Crafty has its own login, so it carries the Caddy labels directly (Docmost pattern, no auth sidecar).
      # Upstream is the panel's self-signed HTTPS on 8443: https upstream + skip cert verification.
      # Crafty REQUIRES websockets (WSS): pin HTTP/1.1 and forward the Upgrade/Connection/Proto/Host headers.
      caddy_0: crafty-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams https 8443}}"
      caddy_0.reverse_proxy.transport: http
      caddy_0.reverse_proxy.transport.tls_insecure_skip_verify:
      caddy_0.reverse_proxy.transport.versions: "1.1"
      caddy_0.reverse_proxy.header_up_0: "Upgrade websocket"
      caddy_0.reverse_proxy.header_up_1: "Connection Upgrade"
      caddy_0.reverse_proxy.header_up_2: "X-Forwarded-Proto https"
      caddy_0.reverse_proxy.header_up_3: "Host {host}"
      caddy_1: crafty-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams https 8443}}"
      caddy_1.reverse_proxy.transport: http
      caddy_1.reverse_proxy.transport.tls_insecure_skip_verify:
      caddy_1.reverse_proxy.transport.versions: "1.1"
      caddy_1.reverse_proxy.header_up_0: "Upgrade websocket"
      caddy_1.reverse_proxy.header_up_1: "Connection Upgrade"
      caddy_1.reverse_proxy.header_up_2: "X-Forwarded-Proto https"
      caddy_1.reverse_proxy.header_up_3: "Host {host}"
      caddy_2: crafty-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams https 8443}}"
      caddy_2.reverse_proxy.transport: http
      caddy_2.reverse_proxy.transport.tls_insecure_skip_verify:
      caddy_2.reverse_proxy.transport.versions: "1.1"
      caddy_2.reverse_proxy.header_up_0: "Upgrade websocket"
      caddy_2.reverse_proxy.header_up_1: "Connection Upgrade"
      caddy_2.reverse_proxy.header_up_2: "X-Forwarded-Proto https"
      caddy_2.reverse_proxy.header_up_3: "Host {host}"
    networks:
      - pcs
    deploy:
      resources:
        limits:
          memory: 2048M

networks:
  pcs:
    name: pcs
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  main: crafty
  webui_port: 80                         # gateway-side port; the Caddy labels map this clean subdomain to the container's 8443. Do NOT set this to 8443 or the dashboard builds 8443-crafty-<domain>:8443
  index: /
  author: Yundera Team
  category: Games
  developer: Arcadia Technology
  store_app_id: crafty
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Crafty/icon.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Crafty/thumbnail.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Crafty/screenshot-1.png
  title:
    en_us: Crafty - Minecraft Server Manager
  tagline:
    en_us: Web-based Minecraft server manager.
    fr_fr: Gestionnaire de serveurs Minecraft en ligne.
    ko_kr: 웹 기반 마인크래프트 서버 관리자.
    es_es: Gestor de servidores de Minecraft basado en web.
  description:
    en_us: |
      Crafty is a web GUI for creating, running and managing
      Minecraft servers (Java and Bedrock) from your browser. It launches and
      supervises your server processes, automates backups, builds servers from
      common loaders, gives you live console access, and supports per-user
      roles and permissions.
    fr_fr: |
      Crafty est une interface web pour creer, lancer et gerer des
      serveurs Minecraft (Java et Bedrock) depuis votre navigateur. Il lance et
      supervise les processus serveur, automatise les sauvegardes, cree des
      serveurs a partir des loaders courants, donne acces a la console en direct
      et gere les roles et permissions par utilisateur.
    ko_kr: |
      Crafty 는 브라우저에서 마인크래프트 서버(자바 및 베드락)를
      생성, 실행, 관리할 수 있는 웹 GUI입니다. 서버 프로세스 실행 및 관리,
      백업 자동화, 일반 로더 기반 서버 생성, 실시간 콘솔 접근, 사용자별 역할
      및 권한을 지원합니다.
  tips:
    before_install:
      en_us: |
        **Getting started**

        Login: `admin`
        Password: `$APP_DEFAULT_PASSWORD!`

        **Creating a server**

        When you create a server, choose a port in the `25500-25600` range
        (the ports this app publishes). Bedrock servers use UDP port `19132`.

        **Sharing your server with players**

        Give players the address below, plus the port of the server you
        created:
 
        - **Java (Java Edition on PC):** host `$APP_PUBLIC_IP_DASH.sslip.io`:`25565`
          (or whichever port you chose)
        - **Bedrock (Consoles + Mobile + Bedrock Edition on PC):** host `$APP_PUBLIC_IP_DASH.sslip.io`, port `19132`

        Your server must be reachable from the internet on that port. If your
        PCS is behind CGNAT or the port is not forwarded, players outside your
        network may be unable to connect.
  pre-install-cmd: |
    mkdir -p /DATA/AppData/$AppID/config /DATA/AppData/$AppID/servers /DATA/AppData/$AppID/backups /DATA/AppData/$AppID/logs /DATA/AppData/$AppID/import
    chown $PUID:$PGID /DATA/AppData/$AppID
    printf '{"username":"admin","password":"%s!"}' "$APP_DEFAULT_PASSWORD" > /DATA/AppData/$AppID/config/default.json
