name: mediawizard
services:
    mediawizard:
        cpu_shares: 30
        container_name: mediawizard
        image: nginx:1.27.3-alpine
        restart: unless-stopped
        expose:
            - "80"
        labels:
            icon: https://cdn.jsdelivr.net/gh/Yundera/AppStoreLab@main/Apps/MediaWizard/icon.png
            caddy_0: mediawizard-${APP_DOMAIN}
            caddy_0.import: gateway_tls
            caddy_0.reverse_proxy: "{{upstreams 80}}"
            caddy_1: mediawizard-${APP_PUBLIC_IP_DASH}.nip.io
            caddy_1.import: gateway_tls
            caddy_1.reverse_proxy: "{{upstreams 80}}"
            caddy_2: mediawizard-${APP_PUBLIC_IP_DASH}.sslip.io
            caddy_2.reverse_proxy: "{{upstreams 80}}"
        volumes:
            - type: bind
              source: /DATA/AppData/mediawizard/html
              target: /usr/share/nginx/html
              bind:
                create_host_path: true
        networks:
            pcs: null
networks:
    pcs:
        name: pcs
        external: true
x-casaos:
    architectures:
        - amd64
        - arm64
    main: mediawizard
    author: Yundera Community
    category: Media
    description:
        en_us: Yundera Media Wizard guides you through setting up your complete self-hosted media stack — Jellyfin, Prowlarr, Radarr, Sonarr, and Jellyseerr — step by step, so everything works together out of the box.
    developer: Yundera Community
    hostname: mediawizard-${APP_DOMAIN}
    icon: https://cdn.jsdelivr.net/gh/Yundera/AppStoreLab@main/Apps/MediaWizard/icon.png
    index: /
    is_uncontrolled: false
    port_map: "443"
    scheme: https
    store_app_id: mediawizard
    tagline:
        en_us: Set up your complete media stack in minutes.
    title:
        en_us: Yundera Media Wizard
    pre-install-cmd: |
        mkdir -p /DATA/AppData/mediawizard/html
        cat > /DATA/AppData/mediawizard/html/index.html << 'HTMLEOF'
        <!DOCTYPE html>
        <html lang="en">
        <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Yundera Media Wizard</title>
        <style>
          *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
          :root {
            --blue: #1a6fdb;
            --blue-light: #e8f0fc;
            --blue-hover: #1560c4;
            --green: #1a7a4a;
            --green-light: #e8f5ee;
            --text-primary: #1a1a1a;
            --text-secondary: #5a5a5a;
            --text-muted: #9a9a9a;
            --surface-0: #f5f5f5;
            --surface-1: #f0f0f0;
            --surface-2: #ffffff;
            --border: rgba(0,0,0,0.08);
            --border-strong: rgba(0,0,0,0.15);
            --radius: 8px;
          }
        
          @media (prefers-color-scheme: dark) {
            :root {
              --text-primary: #f0f0f0;
              --text-secondary: #a0a0a0;
              --text-muted: #606060;
              --surface-0: #141414;
              --surface-1: #1e1e1e;
              --surface-2: #252525;
              --border: rgba(255,255,255,0.08);
              --border-strong: rgba(255,255,255,0.15);
              --blue-light: #1a2d4a;
              --green-light: #0d2a1a;
            }
          }
        
          body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--surface-0);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2rem 1rem;
          }
        
          .wizard {
            width: 100%;
            max-width: 600px;
          }
        
          .header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 0.5px solid var(--border);
          }
        
          .logo {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
          }
        
          .logo svg { width: 24px; height: 24px; fill: white; }
        
          .header-text h1 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.3px;
          }
        
          .header-text p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
          }
        
          .progress {
            display: flex;
            align-items: flex-start;
            margin-bottom: 1.75rem;
            position: relative;
          }
        
          .progress::before {
            content: '';
            position: absolute;
            top: 14px;
            left: 14px;
            right: 14px;
            height: 0.5px;
            background: var(--border);
            z-index: 0;
          }
        
          .step-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            flex: 1;
            position: relative;
            z-index: 1;
          }
        
          .step-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
            background: var(--surface-2);
            border: 0.5px solid var(--border-strong);
            color: var(--text-muted);
          }
        
          .step-dot.done {
            background: var(--blue);
            border-color: var(--blue);
            color: white;
          }
        
          .step-dot.active {
            background: var(--blue);
            border-color: var(--blue);
            color: white;
            box-shadow: 0 0 0 3px rgba(26,111,219,0.18);
          }
        
          .step-label {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            white-space: nowrap;
          }
        
          .step-label.active { color: var(--blue); font-weight: 500; }
          .step-label.done { color: var(--text-secondary); }
        
          .card {
            background: var(--surface-2);
            border: 0.5px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
          }
        
          .step-header {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 1.25rem;
          }
        
          .step-icon {
            width: 46px;
            height: 46px;
            border-radius: 10px;
            background: var(--blue-light);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
          }
        
          .step-icon svg { width: 24px; height: 24px; stroke: var(--blue); fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
        
          .step-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            letter-spacing: -0.2px;
          }
        
          .step-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.55;
          }
        
          .tip {
            background: var(--blue-light);
            border-radius: var(--radius);
            padding: 10px 14px;
            font-size: 13px;
            color: var(--blue);
            display: flex;
            gap: 8px;
            align-items: flex-start;
            margin-bottom: 1.25rem;
            line-height: 1.5;
          }
        
          .tip svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; stroke: var(--blue); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        
          .instructions {
            background: var(--surface-1);
            border-radius: var(--radius);
            padding: 1rem 1.1rem;
            margin-bottom: 1.25rem;
          }
        
          .instructions p {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            padding: 4px 0;
            border-bottom: 0.5px solid var(--border);
          }
        
          .instructions p:last-child { border-bottom: none; padding-bottom: 0; }
          .instructions p:first-child { padding-top: 0; }
          .instructions strong { color: var(--text-primary); font-weight: 500; }
          .instructions code { font-family: monospace; font-size: 12px; background: var(--border); padding: 1px 5px; border-radius: 4px; }
        
          .domain-row {
            margin-bottom: 1.25rem;
          }
        
          .domain-row label {
            font-size: 13px;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 6px;
          }
        
          .domain-input-group {
            display: flex;
            gap: 8px;
          }
        
          .domain-input-group input {
            flex: 1;
            font-size: 13px;
            padding: 8px 12px;
            border: 0.5px solid var(--border-strong);
            border-radius: var(--radius);
            background: var(--surface-2);
            color: var(--text-primary);
            outline: none;
          }
        
          .domain-input-group input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 2px rgba(26,111,219,0.15);
          }
        
          .actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
          }
        
          .btn-primary {
            background: var(--blue);
            color: white;
            border: none;
            border-radius: var(--radius);
            padding: 9px 16px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            transition: background 0.15s;
          }
        
          .btn-primary:hover { background: var(--blue-hover); }
          .btn-primary svg { width: 14px; height: 14px; stroke: white; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        
          .btn-outline {
            background: transparent;
            color: var(--blue);
            border: 0.5px solid var(--blue);
            border-radius: var(--radius);
            padding: 9px 16px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background 0.15s;
          }
        
          .btn-outline:hover { background: var(--blue-light); }
          .btn-outline svg { width: 14px; height: 14px; stroke: var(--blue); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        
          .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 0.5px solid var(--border-strong);
            border-radius: var(--radius);
            padding: 9px 16px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s;
          }
        
          .btn-ghost:hover { background: var(--surface-1); }
          .btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; }
        
          .badge-done {
            background: var(--green-light);
            color: var(--green);
            font-size: 12px;
            font-weight: 500;
            padding: 5px 12px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
          }
        
          .badge-done svg { width: 13px; height: 13px; stroke: var(--green); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        
          .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 0.25rem;
          }
        
          .completed {
            text-align: center;
            padding: 2.5rem 1rem;
          }
        
          .completed-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--blue-light);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem;
          }
        
          .completed-icon svg { width: 32px; height: 32px; stroke: var(--blue); fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
        
          .completed h2 {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.3px;
          }
        
          .completed p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.6;
          }
        </style>
        </head>
        <body>
        <div class="wizard">
          <div class="header">
            <div class="logo">
              <svg viewBox="0 0 24 24"><path d="M15 10l4.553-2.069A1 1 0 0121 8.87v6.26a1 1 0 01-1.447.9L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>
            </div>
            <div class="header-text">
              <h1>Yundera Media Wizard</h1>
              <p>Set up your complete media server in a few steps</p>
            </div>
          </div>
        
          <div class="progress" id="progress"></div>
          <div class="card" id="content"></div>
          <div class="nav" id="nav"></div>
        </div>
        
        <script>
        const STORAGE_KEY = 'yw_domain';
        const DONE_KEY = 'yw_done';
        
        const icons = {
          play: '<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>',
          search: '<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
          film: '<svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>',
          tv: '<svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>',
          list: '<svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>',
          check: '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>',
          external: '<svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>',
          arrow: '<svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>',
          info: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
          star: '<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>',
        };
        
        const steps = [
          {
            id: 'jellyfin',
            label: 'Jellyfin',
            icon: 'play',
            title: 'Set up Jellyfin',
            desc: 'Your media server — the foundation everything else connects to.',
            subdomain: 'jellyfin',
            tip: 'Create an admin account and add your media libraries during the setup wizard.',
            instructions: [
              '<strong>1.</strong> Open Jellyfin using the button below.',
              '<strong>2.</strong> Complete the setup wizard and create your admin account.',
              '<strong>3.</strong> Add your media libraries — Movies at <code>/DATA/Media/Movies</code>, TV Shows at <code>/DATA/Media/TV Shows</code>.',
            ]
          },
          {
            id: 'prowlarr',
            label: 'Prowlarr',
            icon: 'search',
            title: 'Add indexers in Prowlarr',
            desc: 'Prowlarr finds torrents — add indexers so Radarr and Sonarr can search for content.',
            subdomain: 'prowlarr',
            tip: 'YTS is great for movies, EZTV for TV shows — both are free and require no account.',
            instructions: [
              '<strong>1.</strong> Open Prowlarr and go to <strong>Indexers → +</strong>.',
              '<strong>2.</strong> Search for and add indexers like YTS (movies) and EZTV (TV shows).',
              '<strong>3.</strong> Go to <strong>Settings → Apps</strong> and connect both Radarr and Sonarr using their API keys.',
            ]
          },
          {
            id: 'radarr',
            label: 'Radarr',
            icon: 'film',
            title: 'Configure Radarr',
            desc: 'Radarr automatically finds and downloads movies.',
            subdomain: 'radarr',
            tip: 'Get your API key from Settings → General. Connect qBittorrent using container name qbittorrent on port 80.',
            instructions: [
              '<strong>1.</strong> Go to <strong>Settings → Media Management</strong> and add root folder <code>/movies</code>.',
              '<strong>2.</strong> Go to <strong>Settings → Download Clients → +</strong>, choose qBittorrent, set host to <code>qbittorrent</code> and port to <code>80</code>.',
              '<strong>3.</strong> Prowlarr will automatically sync your indexers to Radarr once connected.',
            ]
          },
          {
            id: 'sonarr',
            label: 'Sonarr',
            icon: 'tv',
            title: 'Configure Sonarr',
            desc: 'Sonarr automatically finds and downloads TV shows.',
            subdomain: 'sonarr',
            tip: 'Get your API key from Settings → General. Connect qBittorrent using container name qbittorrent on port 80.',
            instructions: [
              '<strong>1.</strong> Go to <strong>Settings → Media Management</strong> and add root folder <code>/tv</code>.',
              '<strong>2.</strong> Go to <strong>Settings → Download Clients → +</strong>, choose qBittorrent, set host to <code>qbittorrent</code> and port to <code>80</code>.',
              '<strong>3.</strong> Prowlarr will automatically sync your indexers to Sonarr once connected.',
            ]
          },
          {
            id: 'jellyseerr',
            label: 'Jellyseerr',
            icon: 'list',
            title: 'Set up Jellyseerr',
            desc: 'Jellyseerr lets you and your users request movies and TV shows.',
            subdomain: 'jellyseerr',
            tip: 'Sign in with your Jellyfin credentials, then connect Radarr (port 443, SSL on) and Sonarr.',
            instructions: [
              '<strong>1.</strong> Open Jellyseerr, choose Jellyfin, then sign in with your Jellyfin admin credentials (use port 443 with SSL).',
              '<strong>2.</strong> Sync your libraries and continue to step 4.',
              '<strong>3.</strong> Go to <strong>Settings → Services</strong> and add both Radarr and Sonarr servers.',
            ]
          }
        ];
        
        let current = 0;
        let completed = new Set(JSON.parse(localStorage.getItem(DONE_KEY) || '[]'));
        
        function getDomain() {
          return localStorage.getItem(STORAGE_KEY) || '';
        }
        
        function getUrl(step) {
          const d = getDomain();
          if (!d) return null;
          return `https://${step.subdomain}-${d}`;
        }
        
        function saveCompleted() {
          localStorage.setItem(DONE_KEY, JSON.stringify([...completed]));
        }
        
        function renderProgress() {
          const el = document.getElementById('progress');
          el.innerHTML = steps.map((s, i) => {
            const isDone = completed.has(i);
            const isActive = i === current && current < steps.length;
            const cls = isDone ? 'done' : isActive ? 'active' : '';
            const lblCls = isDone ? 'done' : isActive ? 'active' : '';
            const inner = isDone ? icons.check : (i + 1);
            return `<div class="step-indicator">
              <div class="step-dot ${cls}">${inner}</div>
              <span class="step-label ${lblCls}">${s.label}</span>
            </div>`;
          }).join('');
        }
        
        function renderContent() {
          const el = document.getElementById('content');
          const d = getDomain();
        
          if (current >= steps.length) {
            el.innerHTML = `<div class="completed">
              <div class="completed-icon">${icons.star}</div>
              <h2>Your media stack is ready!</h2>
              <p>Everything is set up. Open Jellyseerr to start requesting movies and TV shows — they'll download automatically and appear in Jellyfin.</p>
              <a class="btn-primary" href="https://jellyseerr-${d}" target="_blank">
                ${icons.external} Open Jellyseerr
              </a>
            </div>`;
            return;
          }
        
          const s = steps[current];
          const isDone = completed.has(current);
          const url = getUrl(s);
        
          const domainSection = !d ? `<div class="domain-row">
            <label>Your server domain (e.g. <code>dullgrey.nsl.sh</code>)</label>
            <div class="domain-input-group">
              <input id="domain-input" type="text" placeholder="yourname.nsl.sh" autocomplete="off" />
              <button class="btn-primary" onclick="saveDomain()">Save</button>
            </div>
          </div>` : '';
        
          el.innerHTML = `
            <div class="step-header">
              <div class="step-icon">${icons[s.icon]}</div>
              <div>
                <div class="step-title">${s.title}</div>
                <div class="step-desc">${s.desc}</div>
              </div>
            </div>
            ${domainSection}
            <div class="tip">${icons.info} ${s.tip}</div>
            <div class="instructions">
              ${s.instructions.map(i => `<p>${i}</p>`).join('')}
            </div>
            <div class="actions">
              ${url ? `<a class="btn-primary" href="${url}" target="_blank">${icons.external} Open ${s.label}</a>` : 
                `<button class="btn-primary" disabled style="opacity:0.5;cursor:not-allowed">${icons.external} Open ${s.label}</button>`}
              ${isDone 
                ? `<span class="badge-done">${icons.check} Done</span>` 
                : `<button class="btn-outline" onclick="markDone()">${icons.check} Mark as done</button>`}
            </div>`;
        }
        
        function renderNav() {
          const el = document.getElementById('nav');
          if (current >= steps.length) { el.innerHTML = ''; return; }
          el.innerHTML = `
            <button class="btn-ghost" onclick="prev()" ${current === 0 ? 'disabled' : ''}>Back</button>
            <button class="btn-primary" onclick="next()">
              ${current === steps.length - 1 ? 'Finish' : 'Next'} ${icons.arrow}
            </button>`;
        }
        
        function render() {
          renderProgress();
          renderContent();
          renderNav();
        }
        
        function markDone() {
          completed.add(current);
          saveCompleted();
          render();
        }
        
        function next() {
          if (current <= steps.length) { current++; render(); window.scrollTo(0,0); }
        }
        
        function prev() {
          if (current > 0) { current--; render(); window.scrollTo(0,0); }
        }
        
        function saveDomain() {
          const val = document.getElementById('domain-input').value.trim().replace(/^https?:\/\//, '').replace(/\/$/, '');
          if (val) {
            localStorage.setItem(STORAGE_KEY, val);
            render();
          }
        }
        
        render();
        </script>
        </body>
        </html>
        
        HTMLEOF
    tips:
        before_install:
            en_us: |
                **Before you start, make sure you have these apps installed:**
                - Jellyfin
                - Prowlarr
                - Radarr
                - Sonarr
                - Jellyseerr
